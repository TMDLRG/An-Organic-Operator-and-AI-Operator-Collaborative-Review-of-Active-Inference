# UI build / typecheck workflow.
#
# Runs the Next.js production build and TypeScript typecheck on every
# push and pull request that touches the ui/ subtree. Acceptance:
#   - npm install succeeds
#   - npm run typecheck reports no errors
#   - npm run build produces an optimized production bundle
#
# Failure of either job indicates a UI regression that must be
# investigated before merging.

name: ui-build

on:
  push:
    branches: [main, master]
    paths:
      - 'ui/**'
      - '.github/workflows/ui-build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'ui/**'
      - '.github/workflows/ui-build.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: ./ui

jobs:
  build:
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: ['20.x', '22.x']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Production build
        run: npm run build
