# Top-level CI workflow for the reproducibility test suite.
#
# This workflow runs on every push and pull request, on a 3-OS x 3-Python
# matrix (9 cells). Each cell:
#   1. checks out the repo
#   2. sets up Python at the matrix version
#   3. installs numpy and pytest from manuscript-v2-reproducibility/requirements.txt
#   4. runs audit_tests_v2.py and diffs against reference_output.txt
#      (acceptance: zero diff, i.e. bit-identical output)
#   5. runs the pytest harness (acceptance: all 87 tests green)
#
# Failure of any cell indicates a reproducibility regression that must be
# investigated before any release. v2-publication acceptance is 9-of-9 green.

name: reproducibility-tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Opt into Node.js 24 for JavaScript actions ahead of the 2026-06-02 default
# switch (per GitHub Actions deprecation notice). Lets us continue using
# actions/checkout@v4 and actions/setup-python@v5 without breaking when
# Node.js 20 is removed from runners on 2026-09-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: ./manuscript-v2-reproducibility

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run audit_tests_v2.py and diff against reference_output.txt
        shell: bash
        run: |
          python audit_tests_v2.py > out.txt
          diff out.txt reference_output.txt
          echo "BIT-IDENTICAL OUTPUT: PASS"

      - name: Run pytest harness
        run: pytest tests/ -v

      - name: Run audit_tests_v2.py once more to verify determinism
        shell: bash
        run: |
          python audit_tests_v2.py > out2.txt
          diff out.txt out2.txt
          echo "DETERMINISM: PASS"
